<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/loader.css">
    <link rel="icon" type="image/png" href="assets/ascalon1.png" sizes="16x16">
    <link rel="icon" type="image/png" href="assets/ascalon1.png" sizes="32x32">
    <title>Skin Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/event-calcs.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.2.6/color-thief.min.js"></script>
    <script defer src="js/scroll-container.js"></script>
    <script src="js/pixi/pixi.min.js"></script>
    <script src="js/pixi/pixi-spine.js"></script>
    <script defer type="module" src="js/main.js"></script>
    <script defer src="js/reset-save-load.js"></script>


</head>

<body>
    <header>
        <div id="current-section" style="display: none;">planner</div>
        <div id="fashion-year" style="display: none;">none</div>
        <div id="current-event-code" style="display: none;">none</div>
        <!-- <button style="display: flex;" id="skin-table">Skin Table</button> -->
        <label>
            <input type="checkbox" name="" id="header-gallery-checkbox">

            <div class="header-element"><img class="svg"
                    src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/gallery.svg"
                    alt="Gallery SVG">
                Gallery</div>
        </label>

        <label class="planner-options">
            <button id="reset"></button>
            <div class="header-element">
                <img class="svg"
                    src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/reset.svg" alt="">
                Reset
            </div>
        </label>

        <label class="planner-options">
            <button id="save"></button>
            <div class="header-element">
                <img class="svg" src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/save.svg"
                    alt="">
                Save
            </div>
        </label>

        <label class="planner-options">
            <button id="load"></button>
            <div class="header-element">
                <img class="svg" src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/load.svg"
                    alt="">
                Load
            </div>
        </label>

        <script>
            const checkbox = document.getElementById('header-gallery-checkbox');
            const plannerOptions = document.querySelectorAll('.planner-options');

            function togglePlannerOptions() {
                plannerOptions.forEach((option) => {
                    if (checkbox.checked) {
                        option.classList.remove('show')
                        option.classList.add('hide')
                    } else {
                        option.classList.remove('hide')
                        option.classList.add('show')
                    }
                    //option.style.display = checkbox.checked ? 'none' : 'block';
                });
            }

            checkbox.addEventListener('change', togglePlannerOptions);
            togglePlannerOptions();

        </script>

        <label>
            <button id="discord-button"></button>
            <div class="header-element"><img class="svg"
                    src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/discord.svg"
                    alt="Gallery SVG">
                Discord</div>
        </label>
        <script>
            document.getElementById("discord-button").addEventListener("click", function () {
                window.open("https://discord.gg/uGRu9j88H9", "_blank");
            });
        </script>
        <label>
            <button id="donate-button"></button>

            <div class="header-element"> <img class="svg kofi"
                    src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/kofi.png"
                    alt="Gallery SVG">
                Donate</div>
        </label>
        <script>
            document.getElementById("donate-button").addEventListener("click", function () {
                window.open("https://ko-fi.com/hermitzplanner", "_blank");
            });
        </script>
        <!-- <label class="header-radio">
            <input type="radio" name="language" value="english" id="default-language"> English
        </label>
        <label class="header-radio">
            <input type="radio" name="language" value="mandarin"> Mandarin
        </label> -->

    </header>

    <div id="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ────────✦───────✦───────✦────────✦──────── -->
    <!-- Sections -->
    <!-- ────────✦───────✦───────✦────────✦──────── -->

    <section id="planner">
        <div class="container scroll-contaier" id="container-of-events">

            <div class="initial-row">
                <button class="toggle-button" data-target="summary" id="header-summary-button">Selection Summary</button>
                <button class="toggle-button mobile-toggle" data-target="show-skins" id="header-show-skins-button">Show Skins</button>
                <div id="initial-primes-text">Initial Primes: </div>
                <input style="width: 140px;" type="number" class="initial-input" id="initial" value="0" min="0">
            </div>

            <script>
                document.getElementById("initial").addEventListener("keydown", function (event) {
                    if (event.key === "-" || (/\D/.test(event.key) && event.keyCode !== 8)) {
                        event.preventDefault();
                    }
                });
            </script>
        </div>
        <div class="container" id="container-of-skins">
            <button class="toggle-button mobile-toggle" data-target="show-events" id="header-show-events-button">Show events</button>
            <h2 class="hide" id="container-of-skins-h2">
                <span id="container-of-skins-h2-english" class="english"></span>
                <span id="container-of-skins-h2-mandarin" class="mandarin"></span>
            </h2>
            <div id="container-of-rewards">
                <span style="width: 100%; text-align: center;">Event Stages:</span>
            </div>
            <div class="year-button-filters" id="year-button-filters" style="display: none;">
                <!-- <button class="year-filter-button text-outline" type="submit" value="2026" id="button-filter-2026">2026</button>
                <button class="year-filter-button text-outline" type="submit" value="2025" id="button-filter-2025">2025</button> -->
                <button class="year-filter-button text-outline" type="submit" value="2024"
                    id="button-filter-2024">2024</button>
                <button class="year-filter-button text-outline" type="submit" value="2023"
                    id="button-filter-2023">2023</button>
                <button class="year-filter-button text-outline" type="submit" value="2022"
                    id="button-filter-2022">2022</button>
                <button class="year-filter-button text-outline" type="submit" value="2021"
                    id="button-filter-2021">2021</button>
                <button class="year-filter-button text-outline" type="submit" value="2020"
                    id="button-filter-2020">2020</button>
                <button class="year-filter-button text-outline" type="submit" value="2019"
                    id="button-filter-2019">2019</button>
            </div>
        </div>
    </section>

    <section id="summary"></section>

    <section id="viewer"></section>

    <section id="gallery">
        <div class="gallery-header">
            <div class="main-text flex">Skin Gallery</div>

            <input type="search" class="initial-input2 gallery-options" id="gallery-search-bar" placeholder="Search...">

            <select class="initial-input2 gallery-options" name="year-select" id="gallery-year-filter" data-year-filter>
                <option disabled value="">Select year</option>
                <option value="all">All years (too many skins may lag)</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
                <option value="2019">2019</option>
            </select>

            <select class="initial-input2 gallery-options" name="brand-select" id="gallery-brand-filter"
                data-brand-filter>
                <option disabled value="">Select Brand</option>
                <option selected value="all">All Brands</option>
            </select>

            <select class="initial-input2 gallery-options" name="artist-select" id="gallery-artist-filter"
                data-artist-filter>
                <option disabled value="">Select Artist</option>
                <option selected value="all">All Artists</option>
            </select>

            <select class="initial-input2 gallery-options" name="rarity-select" id="gallery-rarity-filter"
                data-rarity-filter>
                <option disabled value="">Select Rarity</option>
                <option selected value="all">All Rarities</option>
            </select>

            <select class="initial-input2 gallery-options" name="price-select" id="gallery-price-filter"
                data-price-filter>
                <option disabled value="">Select Price</option>
                <option selected value="all">All Prices</option>
            </select>

        </div>
        <div id="gallery-skins"></div>
    </section>

    <!-- ────────✦───────✦───────✦────────✦──────── -->
    <!-- Viewer Templates -->
    <!-- ────────✦───────✦───────✦────────✦──────── -->

    <template id="viewer-template">
        <img id="viewer-image" src="" alt="">
        <img src="" alt="" id="viewer-image-background">
        <div id="viewer-info">
            <button class="quit-viewer-button">Quit</button>
            <button class="quit-viewer-button collapse-viewer-button">Collapse</button>
            <img src="" alt="" class="viewer-rarity">
            <div class="color-list-div"></div>
            <div class="viewer-header">
                <img class="viewer-icon-image dynamic-img-color viewer-show-image" src="" alt="">
                <div class="viewer-model-name primary-color"></div>
                <div class="viewer-skin-name primary-color"></div>
            </div>

            <div id="chibi-canvas">
                <canvas width="500" height="250"></canvas>
                <div class="chibi-buttons primary-color show">
                    <button class="chibi-row secondary-color">Change Skin</button>
                    <button class="chibi-row secondary-color">Animation List</button>
                    <button class="chibi-row secondary-color">Perspective</button>
                    <button class="chibi-row secondary-color">
                        <img src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/save.svg"
                            class="svg chibi-save-img" style="width: 15px;">
                    </button>
                </div>
                <div class="animation-list-div show"></div>
                <div class="info-rows">
                    <div class="viewer-row primary-color"></div>

                    <div class="viewer-row primary-color viewer-price"></div>
                    <div class="viewer-row primary-color viewer-artist"></div>
                    <div class="viewer-row primary-color viewer-acquisition"></div>
                    <div class="viewer-row primary-color viewer-brand"></div>
                    <div class="viewer-row primary-color viewer-cn-release"></div>
                    <div class="viewer-row primary-color viewer-en-release"></div>
                    <div class="viewer-row-double secondary-color viewer-upcoming-event"></div>
                </div>
            </div>





        </div>
        <div class="viewer-tips">drag the image with click <br> scroll to zoom</div>
    </template>

    <!-- ────────✦───────✦───────✦────────✦──────── -->
    <!-- Planner Templates -->
    <!-- ────────✦───────✦───────✦────────✦──────── -->

    <template id="stage-reward-template">
        <label class="reward">
            <input type="checkbox" name="reward-cbox" id="">
            <div class="stage-name"></div>
        </label>
    </template>

    <template id="event-container-template">
        <label class="event hide">
            <input type="radio" name="event" id="">
            <div class="event-code hide"></div>
            <div class="event-name mandarin text-outline"></div>
            <div class="event-name-english english text-outline"></div>
            <div class="event-date hide"></div>
            <div class="event-skins hide"></div>
            <img alt="" src="">
            <div class="calcs-div">
                <div class="calcs-row">
                    <span class="english">Income</span>
                    <span class="mandarin">收入</span>
                    <span class="income">0</span>
                </div>
                <div class="calcs-row cost">
                    <span class="english">Expenses</span>
                    <span class="mandarin">支出</span>
                    <span class="expense">0</span>
                </div>
                <div class="calcs-row total">
                    <span class="english">Balance</span>
                    <span class="mandarin">余额</span>
                    <span class="balance">0</span>
                </div>
            </div>
        </label>
    </template>

    <template id="planner-brand-template">
        <div class="break hide"></div>
        <div class="planner-brand hide">
            <img class="planner-brand-image" src="" alt="">
            <div class="planner-brand-name">Brand Name Template</div>
            <div class="planner-brand-type">New Or Rerun</div>
        </div>
    </template>

    <template id="planner-skin-template">
        <label class="planner-skin-label skin hide">
            <input type="checkbox" name="skin-cbox">
            <canvas width="180" height="360" class="planner-skin-background-canvas"
                style="position: absolute; border-radius: 0px;"></canvas>
            <div class="skin-name mandarin hide">雨霓行游客</div>
            <div class="skin-name english hide">No translation</div>
            <div class="model-name english text-outline">
                modelName
                <!-- <span class="model-name english">model-name english</span>
                <span class="model-name mandarin">model-name mandarin</span> -->

            </div>
            <canvas width="180" height="28" class="planner-skin-name-canvas"></canvas>
            <div class="planner-id hide">planner-id</div>
            <img alt="" class="skin-portrait" src="">
            <div class="planner-skin-event-code hide">arknightsxsanriocharacters</div>
            <div class="overlay text-outline">Selected</div>
            <div class="skin-price text-outline">0</div>
            <img class="planner-skin-profession" src="" alt="">
            <button class="skin-inspect">
                <img alt="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/search.svg"
                    class="skin-inspect-img" src="">
            </button>
            <div class="effect-overlay"></div>
        </label>
    </template>

    <template id="fashion-review-skin-template">
        <img src="" alt="" class="hide">
    </template>

    <template id="template-event-calcs">
        <div class="calcs-div">
            <div class="calcs-row"><span class="english">Income</span><span class="mandarin">收入</span> <span
                    class="income">0</span></div>
            <div class="calcs-row cost"><span class="english">Expenses</span><span class="mandarin">支出</span> <span
                    class="expense">0</div>
            <div class="calcs-row total"><span class="english">Balance</span><span class="mandarin">余额</span> <span
                    class="balance">0</div>
        </div>
    </template>

    <!-- ────────✦───────✦───────✦────────✦──────── -->
    <!-- Gallery Templates -->
    <!-- ────────✦───────✦───────✦────────✦──────── -->

    <template id="gallery-skin-template">
        <button class="gallery-skin-button">
            <canvas class="gallery-name-canvas" width="138" height="29"></canvas>
            <div class="gallery-name text-outline">xingzhu1</div>
            <canvas class="gallery-icon-canvas" width="140" height="171"></canvas>
            <img class="gallery-icon" alt="" loading="lazy" src="">
        </button>
    </template>

    <!-- ────────✦───────✦───────✦────────✦──────── -->
    <!-- Summary Templates -->
    <!-- ────────✦───────✦───────✦────────✦──────── -->

    <template id="summary-event-template">
        <div class="summary-row">
            <div class="summary-event">
                <div class="name"></div>
                <img src="">
            </div>
            <div class="calcs-div">
                <div class="calcs-row income">
                    <span class="english">Income</span>
                    <span class="mandarin">收入</span>
                    <span class="income">0</span>
                </div>
                <div class="calcs-row cost">
                    <span class="english">Expenses</span>
                    <span class="mandarin">支出</span>
                    <span class="expense span-expense">0</span>
                </div>
                <div class="calcs-row total">
                    <span class="english">Balance</span>
                    <span class="mandarin">余额</span>
                    <span class="balance span-balance">0</span>
                </div>
            </div>
        </div>
    </template>

    <template id="summary-skin-template">
        <div class="summary-skin" style="position: relative;">
            <canvas class="gallery-name-canvas" width="100" height="30"></canvas>
            <div class="name"></div>
            <canvas class="gallery-icon-canvas" width="100" height="100"></canvas>
            <img class="summary-icon" src="">
            <button class="skin-inspect"
                style="background: linear-gradient(to right, rgba(0, 0, 0, 0.8), rgba(24, 24, 24, 0.8)); top: 30px;">
                <img src="https://raw.githubusercontent.com/HermitzPlanner/planner-images/main/svg/search.svg"
                    class="skin-inspect-img">
            </button>
        </div>
    </template>
</body>

</html>
